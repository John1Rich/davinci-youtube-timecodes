<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timecode</title>
  </head>
  <!-- Выполнится скрипт только после полной загрузки html -->
  <script src="./app.js" defer></script>
  <body>
    <!-- Форма для drag and drop -->
    <div id="drag-and-drop"><p>Перетащите edl файл</p></div>
    <!-- Кнопка выбора файла -->
    <input
      id="output"
      type="file"
      accept=".edl"
      required
      title="Выберите файл"
    />
    <!-- Отображение готовых таймкодов -->
    <textarea id="" name=""></textarea>
    <!-- Кнопка Скопировать -->
    <button id="copyBtn" title="Скопировать">Скопировать</button>
  </body>
</html>
